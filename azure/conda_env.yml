name: sentimentops-env-v5
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - setuptools>=65.0
  - numpy=1.26.4
  - scipy
  - pip
  - pip:
    - pandas
    - scikit-learn
    - mlflow
    - azureml-mlflow
    - datasets
    - huggingface-hub
    - python-dotenv
    - joblib